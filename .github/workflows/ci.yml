name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Package Tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  demo-macos:
    name: Demo App (macOS)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build demo
        run: |
          xcodebuild build \
            -project Demo/ObfuscatedDemo.xcodeproj \
            -scheme ObfuscatedDemo \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO

  demo-ios:
    name: Demo App (iOS Simulator)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build demo
        run: |
          xcodebuild build \
            -project Demo/ObfuscatedDemo.xcodeproj \
            -scheme ObfuscatedDemo \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO
